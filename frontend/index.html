<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SenSante - Pre-diagnostic</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

    <header class="bg-blue-600 text-white py-4 shadow-lg">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-2xl font-bold">SenSante</h1>
            <p class="text-blue-100 text-sm">Assistant pré-diagnostic médical</p>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <div id="form-section" class="bg-white rounded-xl shadow-md p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Symptômes du patient</h2>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nom du patient</label>
                    <input type="text" id="nom" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: Moussa Diop">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Âge</label>
                    <input type="number" id="age" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: 28" min="0" max="120">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Sexe</label>
                    <select id="sexe" class="w-full border border-gray-300 rounded-lg p-2">
                        <option value="F">Féminin</option>
                        <option value="M">Masculin</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Température (°C)</label>
                    <input type="number" id="temperature" step="0.1" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: 38.5" min="35" max="42">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tension systolique</label>
                    <input type="number" id="tension_sys" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="Ex: 120" min="60" max="250">
                </div>

                <div class="mb-3">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Symptômes</label>
                    <div class="space-y-2">
                        <label class="flex items-center">
                            <input type="checkbox" id="toux" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Toux</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="fatigue" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Fatigue</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="maux_tete" class="rounded text-blue-600 mr-2">
                            <span class="text-gray-700">Maux de tête</span>
                        </label>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Région</label>
                    <select id="region" class="w-full border border-gray-300 rounded-lg p-2">
                        <option value="Dakar">Dakar</option>
                        <option value="Thies">Thiès</option>
                        <option value="Saint-Louis">Saint-Louis</option>
                        <option value="Ziguinchor">Ziguinchor</option>
                        <option value="Kolda">Kolda</option>
                    </select>
                </div>

                <button onclick="diagnostiquer()" id="btn-diag" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200 shadow-md">
                    Diagnostiquer
                </button>
            </div>

            <div id="result-section">
                <div class="bg-white rounded-xl shadow-md p-6 text-center text-gray-400">
                    <p class="text-4xl mb-3">&#129658;</p>
                    <p class="font-medium">Remplissez le formulaire</p>
                    <p class="text-sm mt-1">puis cliquez sur Diagnostiquer</p>
                </div>
            </div>
        </div>

        <div id="historique-section" class="mt-8 bg-white rounded-xl shadow-md p-6 hidden">
            <h3 class="text-lg font-bold text-gray-800 mb-4">5 Dernières Consultations</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="border-b text-gray-500">
                            <th class="py-2">Patient</th>
                            <th class="py-2">Diagnostic</th>
                            <th class="py-2">Probabilité</th>
                            <th class="py-2">Heure</th>
                        </tr>
                    </thead>
                    <tbody id="historique-corps"></tbody>
                </table>
            </div>
        </div>
    </main>

    <footer class="text-center text-gray-400 text-sm py-4">
        SenSante v0.3 - ESP/UCAD - L2 GLSI 2026
    </footer>

    <script>
        const API_URL = "http://localhost:8000";
        const historique = [];

        async function diagnostiquer() {
            const nom = document.getElementById("nom").value || "Anonyme";
            const patient = {
                age: parseInt(document.getElementById("age").value),
                sexe: document.getElementById("sexe").value,
                temperature: parseFloat(document.getElementById("temperature").value),
                tension_sys: parseInt(document.getElementById("tension_sys").value),
                toux: document.getElementById("toux").checked,
                fatigue: document.getElementById("fatigue").checked,
                maux_tete: document.getElementById("maux_tete").checked,
                region: document.getElementById("region").value
            };

            if (!patient.age || isNaN(patient.temperature) || !patient.tension_sys) {
                afficherErreur("Veuillez remplir tous les champs correctement.");
                return;
            }

            afficherChargement();

            try {
                const response = await fetch(API_URL + "/predict", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(patient)
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail ? JSON.stringify(err.detail) : "Erreur serveur");
                }

                const resultat = await response.json();
                afficherResultat(resultat, nom);

            } catch (error) {
                afficherErreur("Erreur de connexion : " + error.message);
            }
        }

        function afficherChargement() {
            document.getElementById("result-section").innerHTML = `
                <div class="bg-white rounded-xl shadow-md p-6 text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
                    <p class="text-gray-500">Analyse en cours...</p>
                </div>`;
        }

        function afficherResultat(r, nomPatient) {
            const couleurs = {
                palu:   { bg: "bg-red-100",    text: "text-red-800",    bar: "bg-red-500",    badge: "bg-red-500",    icon: "🌡️" },
                grippe: { bg: "bg-orange-100", text: "text-orange-800", bar: "bg-orange-500", badge: "bg-orange-500", icon: "❄️" },
                typh:   { bg: "bg-yellow-100", text: "text-yellow-800", bar: "bg-yellow-500", badge: "bg-yellow-500", icon: "⚠️" },
                sain:   { bg: "bg-green-100",  text: "text-green-800",  bar: "bg-green-500",  badge: "bg-green-500",  icon: "✅" }
            };

            const c = couleurs[r.diagnostic] || couleurs["sain"];
            const pct = Math.round(r.probabilite * 100);
            
            document.getElementById("result-section").innerHTML = `
                <div class="bg-white rounded-xl shadow-md p-6">
                    <h2 class="text-xl font-bold text-gray-800 mb-4">Résultat pour ${nomPatient}</h2>
                    <div class="${c.bg} rounded-lg p-4 mb-4 flex items-center justify-between">
                        <div>
                            <p class="text-sm text-gray-600">Diagnostic :</p>
                            <p class="text-2xl font-bold ${c.text} uppercase mt-1">${r.diagnostic}</p>
                        </div>
                        <span class="text-4xl">${c.icon}</span> 
                    </div>
                    <div class="mb-4">
                        <div class="flex justify-between mb-1">
                            <span class="text-sm text-gray-600">Probabilité</span>
                            <span class="text-sm font-bold ${c.text}">${pct}%</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-3">
                            <div class="${c.bar} h-3 rounded-full transition-all duration-500" style="width: ${pct}%"></div>
                        </div>
                    </div>
                    <div class="bg-gray-50 rounded-lg p-3 mb-2">
                        <p class="text-sm text-gray-700">${r.message}</p>
                    </div>
                </div>`;

            ajouterAHistorique(nomPatient, r.diagnostic, pct);
            
            // Appel automatique de la route explicative Groq / LLM
            demanderExplication(r);
        }

        async function demanderExplication(diagnostic_data) {
            const explainData = {
                diagnostic: diagnostic_data.diagnostic,
                probabilite: diagnostic_data.probabilite,
                age: parseInt(document.getElementById("age").value),
                sexe: document.getElementById("sexe").value,
                temperature: parseFloat(document.getElementById("temperature").value),
                region: document.getElementById("region").value
            };

            const section = document.getElementById("result-section");

            const explDiv = document.createElement("div");
            explDiv.id = "explication-zone";
            explDiv.innerHTML = `
                <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">
                    <p class="text-sm text-purple-600 font-medium mb-2">Explication (Llama 3)</p>
                    <p class="text-gray-500 text-sm animate-pulse">Génération en cours...</p>
                </div>`;
            
            section.querySelector(".bg-white").appendChild(explDiv);

            try {
                const response = await fetch(API_URL + "/explain", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(explainData)
                });

                if (response.ok) {
                    const result = await response.json();
                    explDiv.innerHTML = `
                        <div class="mt-4 bg-purple-50 rounded-lg p-4 border border-purple-200">
                            <p class="text-sm text-purple-600 font-medium mb-2">Explication (Llama 3)</p>
                            <p class="text-gray-700 text-sm leading-relaxed">${result.explication}</p>
                        </div>`;
                }
            } catch (error) {
                explDiv.innerHTML = `
                    <div class="mt-4 bg-gray-50 rounded-lg p-3">
                        <p class="text-gray-400 text-sm">Explication non disponible.</p>
                    </div>`;
            }
        }

        function ajouterAHistorique(nom, diagnostic, proba) {
            historique.unshift({ nom, diag: diagnostic, prob: proba, heure: new Date().toLocaleTimeString() });
            if (historique.length > 5) historique.pop();
            majTableauHistorique();
        }

        function majTableauHistorique() {
            const section = document.getElementById("historique-section");
            section.classList.remove("hidden");
            document.getElementById("historique-corps").innerHTML = historique.map(c => `
                <tr class="border-b">
                    <td class="py-2 font-medium">${c.nom}</td>
                    <td class="py-2 font-semibold uppercase text-blue-600">${c.diag}</td>
                    <td class="py-2">${c.prob}%</td>
                    <td class="py-2 text-gray-400">${c.heure}</td>
                </tr>
            `).join('');
        }

        function afficherErreur(msg) {
            document.getElementById("result-section").innerHTML = `
                <div class="bg-red-50 border border-red-200 rounded-xl p-6">
                    <p class="text-red-700 font-medium">${msg}</p>
                </div>`;
        }
    </script>
</body>
</html>
